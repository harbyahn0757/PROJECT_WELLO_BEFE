<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Drawer iframe test</title>
  <style>
    body { margin: 0; font-family: sans-serif; }
    .parent-scroll { height: 2000px; background: #eee; padding: 20px; }
    .parent-scroll h1 { color: #666; font-size: 14px; }
    .iframe-frame {
      position: fixed;
      top: 100px;
      left: 100px;
      width: 800px;
      height: 600px;
      border: 2px solid red;
      background: white;
    }
    .iframe-frame iframe {
      width: 100%;
      height: 100%;
      border: 0;
    }
    .legend {
      position: fixed;
      top: 10px;
      left: 10px;
      background: white;
      border: 1px solid #ccc;
      padding: 10px;
      font-size: 12px;
      border-radius: 6px;
    }
    .legend h3 { margin: 0 0 6px; font-size: 13px; }
    .legend ul { margin: 0; padding: 0 0 0 16px; }
  </style>
</head>
<body>
  <div class="legend">
    <h3>Drawer iframe 안전성 테스트</h3>
    <ul>
      <li>빨간 테두리 = iframe 영역 (800x600)</li>
      <li>Drawer 가 빨간 테두리 밖으로 탈출하지 않아야 함</li>
      <li>overlay 가 회색 영역(부모)으로 넘치지 않아야 함</li>
      <li>부모 회색 스크롤은 Drawer 열려도 계속 움직여야 함</li>
    </ul>
  </div>
  <div class="parent-scroll">
    <h1>부모 스크롤 영역 (2000px 높이) — Drawer 열려도 이 영역 스크롤 가능해야 함</h1>
  </div>
  <div class="iframe-frame">
    <!-- containment="container" 모드 테스트: isEmbedMode=true 가 되어야 함 -->
    <!-- api_key + partner_id 가 있으면 isEmbedMode=true → Drawer 가 container 모드로 자동 전환 -->
    <iframe
      src="/backoffice/health-report?api_key=test&partner_id=test&hospital_id=test"
      title="Drawer iframe test"
    ></iframe>
  </div>
</body>
</html>
