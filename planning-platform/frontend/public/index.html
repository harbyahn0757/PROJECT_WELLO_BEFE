<!DOCTYPE html>
<html lang="ko">
  <head>
    <meta charset="utf-8" />
    <link rel="icon" type="image/png" href="%PUBLIC_URL%/welno_logo.png" />
    <link rel="shortcut icon" type="image/png" href="%PUBLIC_URL%/welno_logo.png" />
    <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover" />
    <meta name="theme-color" content="#000000" />
    <meta name="description" content="WELNO 건강검진 플랫폼 - AI 기반 개인 맞춤형 건강검진 서비스" />
    <link rel="apple-touch-icon" href="%PUBLIC_URL%/welno_logo.png" />
    <link rel="manifest" href="%PUBLIC_URL%/manifest.json" />
    <title>WELNO | 건강검진 플랫폼</title>
  </head>
  <body style="margin: 0; padding: 0; overflow-x: hidden; border: none; border-bottom: none; outline: none;">
    <noscript>JavaScript를 활성화해야 WELNO 서비스를 이용할 수 있습니다.</noscript>
    <div id="root" style="margin: 0; padding: 0; border: none; border-bottom: none; outline: none;"></div>
    <!-- 보안 설정 스크립트 (React 로드 전 실행) -->
    <script>
      (function() {
        // 우클릭 방지
        document.addEventListener('contextmenu', function(e) {
          e.preventDefault();
          return false;
        }, { passive: false });
        
        // 이미지 드래그 방지
        document.addEventListener('dragstart', function(e) {
          if (e.target instanceof HTMLImageElement) {
            e.preventDefault();
            return false;
          }
        }, { passive: false });
        
        // 키보드 단축키 방지
        document.addEventListener('keydown', function(e) {
          // F12
          if (e.key === 'F12') {
            e.preventDefault();
            return false;
          }
          // Ctrl+Shift+I, Ctrl+Shift+J
          if (e.ctrlKey && e.shiftKey && (e.key === 'I' || e.key === 'J')) {
            e.preventDefault();
            return false;
          }
          // Ctrl+U (소스 보기)
          if (e.ctrlKey && e.key === 'u') {
            e.preventDefault();
            return false;
          }
        }, { passive: false });
        
        // 프로덕션 환경에서는 모든 console 완전 비활성화
        if (window.location.hostname !== 'localhost' && !window.location.hostname.startsWith('192.168')) {
          if (typeof console !== 'undefined') {
            console.log = function() {};
            console.info = function() {};
            console.debug = function() {};
            console.warn = function() {};
            console.error = function() {};  // 에러 로그도 제거
            console.trace = function() {};
            console.table = function() {};
            console.group = function() {};
            console.groupEnd = function() {};
            console.groupCollapsed = function() {};
            console.time = function() {};
            console.timeEnd = function() {};
            console.count = function() {};
            console.clear = function() {};
          }
        }
        
        // 현재 URL에서 쿼리 파라미터 추출
        var currentUrl = window.location.href;
        var urlObj = new URL(currentUrl);
        var queryString = urlObj.search;
        
        // 쿼리 파라미터가 있으면 sessionStorage에 저장 (항상 최신 값으로 업데이트)
        if (queryString) {
          var savedParams = sessionStorage.getItem('welno_query_params');
          // 새로운 쿼리 파라미터가 있으면 항상 업데이트 (이전 값 덮어쓰기)
          if (queryString !== savedParams) {
            // console.log 제거됨 (프로덕션 환경)
            sessionStorage.setItem('welno_query_params', queryString);
          }
          
          // URL에 쿼리 파라미터가 없으면 복원
          if (!window.location.search && queryString) {
            var newUrl = window.location.pathname + queryString + window.location.hash;
            window.history.replaceState(window.history.state, '', newUrl);
            // console.log 제거됨 (프로덕션 환경)
          }
        } else {
          // 쿼리 파라미터가 없으면 sessionStorage 초기화 (직접 접속 시 이전 파라미터 제거)
          sessionStorage.removeItem('welno_query_params');
        }
      })();
    </script>
  </body>
</html>
